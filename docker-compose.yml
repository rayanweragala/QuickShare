services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: quickshare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - quickshare-network

  # Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickshare-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVER_PORT=8080
      - SOCKETIO_PORT=8080
    volumes:
      - backend-logs:/var/log/local-share
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/sessions || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - quickshare-network

volumes:
  redis-data:
    driver: local
  backend-logs:
    driver: local

networks:
  quickshare-network:
    driver: bridge