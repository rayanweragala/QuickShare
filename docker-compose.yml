services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: localshare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - localshare-network

  # backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localshare-backend
    ports:
      - "8080:8080"
      - "9092:9092"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SERVER_PORT=8080
      - SOCKETIO_PORT=9092
    volumes:
      - backend-logs:/var/log/local-share
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo 'Backend running'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - localshare-network

volumes:
  redis-data:
    driver: local
  backend-logs:
    driver: local

networks:
  localshare-network:
    driver: bridge
