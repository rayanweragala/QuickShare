server:
  port: 8080
  servlet:
    context-path: /

  compression:
    enabled: true
    min-response-size: 1024
    mime-types:
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - application/json

  http2:
    enabled: true
  error:
    include-stacktrace: never
    include-message: always

spring:
  application:
    name: LocalShare-Backend
  data:
    redis:
      url: rediss://default:AS70AAIncDJmYjRmYjY2N2NjM2E0MDQ0YjUxNmYyMDI3ZGQ5OWU4NHAyMTIwMjA@mighty-gobbler-12020.upstash.io:6379
      connect-timeout: 10000ms
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: PT10S
  web:
    resources:
      static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, classpath:/public/
      cache:
          period: 31536000
  mvc:
    static-path-pattern: /**

socketio:
  host: 0.0.0.0
  port: 8080
  max-frame-payload-length: 1048576
  max-http-content-length: 1048576
  boss-threads: 1
  worker-threads: 4

session:
  timeout-minutes: 30
  cleanup-interval-minutes: 5

cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
    - http://localhost:8080
    - https://localshare-15ui.onrender.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
  allowed-headers:
    - "*"
  allow-credentials: true

logging:
  config: classpath:logback-spring.xml
  level:
    root: info
    com.localshare.backend: DEBUG