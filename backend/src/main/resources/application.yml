server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
    mime-types:
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - application/json
  http2:
    enabled: true
  error:
    include-stacktrace: never
    include-message: always

spring:
  application:
    name: QuickShare-Backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 10

  data:
    redis:
      url: rediss://default:AS70AAIncDJmYjRmYjY2N2NjM2E0MDQ0YjUxNmYyMDI3ZGQ5OWU4NHAyMTIwMjA@mighty-gobbler-12020.upstash.io:6379
      connect-timeout: 10000ms
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: PT10S

  web:
    resources:
      static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, classpath:/public/
      cache:
        period: 31536000

  mvc:
    static-path-pattern: /**

r2:
 account-id: ${R2_ACCOUNT_ID}
 access-key-id: ${R2_ACCESS_KEY_ID}
 secret-access-key: ${R2_SECRET_ACCESS_KEY}
 bucket-name: ${R2_BUCKET_NAME}
 endpoint: ${R2_ENDPOINT}

file:
  max-size: 1073741824
  upload:
    timeout: 300000

socketio:
  host: 0.0.0.0
  port: 8080
  max-frame-payload-length: 1048576
  max-http-content-length: 1048576
  boss-threads: 1
  worker-threads: 4

session:
  timeout-minutes: 30
  cleanup-interval-minutes: 5

cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
    - http://localhost:8080
    - https://localshare-15ui.onrender.com
    - https://quickshare-xuck.onrender.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
  allowed-headers:
    - "*"
  allow-credentials: true

logging:
  config: classpath:logback-spring.xml
  level:
    root: info
    com.quickshare.backend: DEBUG

app:
  base-url: https://localshare-15ui.onrender.com
